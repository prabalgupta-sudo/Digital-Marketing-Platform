version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: marketing-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: marketing-platform
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./infrastructure/mongodb/init:/docker-entrypoint-initdb.d
    networks:
      - marketing-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  # User Service
  user-service:
    build:
      context: ./apps/user-service
      dockerfile: Dockerfile
    container_name: marketing-user-service
    restart: unless-stopped
    environment:
      - PORT=4001
      - MONGODB_URI=mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD}@mongodb:27017/user-service?authSource=admin
      - NODE_ENV=production
    ports:
      - "4001:4001"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - marketing-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Campaign Service
  campaign-service:
    build:
      context: ./apps/campaign-service
      dockerfile: Dockerfile
    container_name: marketing-campaign-service
    restart: unless-stopped
    environment:
      - PORT=4002
      - MONGODB_URI=mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD}@mongodb:27017/campaign-service?authSource=admin
      - NODE_ENV=production
    ports:
      - "4002:4002"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - marketing-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Analytics Service
  analytics-service:
    build:
      context: ./apps/analytics-service
      dockerfile: Dockerfile
    container_name: marketing-analytics-service
    restart: unless-stopped
    environment:
      - PORT=4003
      - MONGODB_URI=mongodb://${MONGO_USERNAME:-admin}:${MONGO_PASSWORD}@mongodb:27017/analytics-service?authSource=admin
      - NODE_ENV=production
    ports:
      - "4003:4003"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - marketing-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4003/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # WunderGraph Gateway
  wundergraph:
    build:
      context: ./wundergraph
      dockerfile: Dockerfile
    container_name: marketing-wundergraph
    restart: unless-stopped
    environment:
      - PORT=9999
      - USER_SERVICE_URL=http://user-service:4001/graphql
      - CAMPAIGN_SERVICE_URL=http://campaign-service:4002/graphql
      - ANALYTICS_SERVICE_URL=http://analytics-service:4003/graphql
      - NODE_ENV=production
    ports:
      - "9999:9999"
    depends_on:
      user-service:
        condition: service_healthy
      campaign-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
    networks:
      - marketing-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:9999/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis Cache (optional, for caching)
  redis:
    image: redis:7-alpine
    container_name: marketing-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - marketing-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: marketing-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - wundergraph
    networks:
      - marketing-network

networks:
  marketing-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
